version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: bugsquash-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-bugsquash_secret}
      MONGO_INITDB_DATABASE: bugsquash_ci
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bugsquash-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bugsquash-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD:-bugsquash_secret}@mongodb:27017/bugsquash_ci?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-bugsquash_jwt_production_secret_key}
      PORT: 5000
      CLIENT_URL: http://localhost
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - bugsquash-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bugsquash-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - bugsquash-network

volumes:
  mongodb_data:

networks:
  bugsquash-network:
    driver: bridge
