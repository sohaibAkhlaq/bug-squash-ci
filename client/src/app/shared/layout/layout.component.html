<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-slate-100 flex">

  <!-- Animated Background -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-gradient-to-br from-primary-200/20 to-secondary-200/20 rounded-full blur-3xl animate-float"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-gradient-to-tr from-accent-200/20 to-primary-200/20 rounded-full blur-3xl animate-float" style="animation-delay:-3s"></div>
  </div>

  <!-- Glassmorphism Sidebar -->
  <aside class="fixed left-0 top-0 h-full z-50 transition-all duration-300 ease-out"
         [class.w-72]="sidebarOpen" [class.w-20]="!sidebarOpen">
    <div class="h-full m-3 rounded-2xl glass shadow-glass overflow-hidden flex flex-col">

      <!-- Logo -->
      <div class="p-5 border-b border-slate-200/50">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-secondary-500 shadow-lg flex items-center justify-center transition-transform hover:scale-110 hover:rotate-3">
            <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 12.75c1.148 0 2.278.08 3.383.237 1.037.146 1.866.966 1.866 2.013 0 3.728-2.35 6.75-5.25 6.75S6.75 18.728 6.75 15c0-1.046.83-1.867 1.866-2.013A24.204 24.204 0 0112 12.75zm0 0c2.883 0 5.647.508 8.207 1.44a23.91 23.91 0 01-1.152-6.135c-.22-2.057-1.907-3.555-3.966-3.555H8.911c-2.059 0-3.746 1.498-3.966 3.555a23.908 23.908 0 01-1.152 6.135A24.078 24.078 0 0112 12.75zM9.75 8.625a.375.375 0 11-.75 0 .375.375 0 01.75 0zm4.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
          </div>
          <div *ngIf="sidebarOpen" class="animate-fade-in-scale">
            <h1 class="text-lg font-bold gradient-text">BugSquash</h1>
            <p class="text-[10px] text-slate-400 font-medium tracking-wide uppercase">CI Platform</p>
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
        <a *ngFor="let item of navItems"
           [routerLink]="item.path"
           [class]="isActive(item.path) ? 'nav-link-active' : 'nav-link'"
           [title]="item.label">
          <svg class="icon nav-icon transition-transform duration-200 group-hover:scale-110" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" [innerHTML]="item.svgPath"></svg>
          <span *ngIf="sidebarOpen" class="truncate">{{ item.label }}</span>
          <!-- Active indicator -->
          <div *ngIf="isActive(item.path)" class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-gradient-to-b from-primary-500 to-secondary-500 rounded-r-full"></div>
        </a>
      </nav>

      <!-- Sidebar Footer -->
      <div class="p-3 border-t border-slate-200/50">
        <button (click)="toggleSidebar()"
                class="nav-link w-full justify-center" title="Toggle Sidebar">
          <svg *ngIf="sidebarOpen" class="icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18.75 19.5l-7.5-7.5 7.5-7.5m-6 15L5.25 12l7.5-7.5"/></svg>
          <svg *ngIf="!sidebarOpen" class="icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 4.5l7.5 7.5-7.5 7.5m-6-15l7.5 7.5-7.5 7.5"/></svg>
          <span *ngIf="sidebarOpen">Collapse</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col transition-all duration-300"
       [class.ml-72]="sidebarOpen" [class.ml-20]="!sidebarOpen">

    <!-- Top Bar (Glassmorphism) -->
    <header class="sticky top-0 z-40 mx-4 mt-3 rounded-2xl glass shadow-glass">
      <div class="px-6 py-3.5 flex items-center justify-between">
        <!-- Left -->
        <div class="flex items-center gap-4">
          <button (click)="toggleMobileMenu()" class="lg:hidden btn-icon">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
          </button>
          <nav class="hidden sm:flex items-center gap-2 text-sm">
            <svg class="icon-sm text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
            <svg class="icon-sm text-slate-300" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
            <span class="text-slate-600 font-medium">{{ currentRoute.replace('/', '') | titlecase }}</span>
          </nav>
        </div>

        <!-- Right -->
        <div class="flex items-center gap-3">
          <!-- Role Badge -->
          <span class="badge badge-info hidden sm:inline-flex" *ngIf="currentUser">
            <svg class="icon-sm" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
            {{ authService.getRoleLabel(currentUser.role) }}
          </span>

          <!-- User Avatar -->
          <div class="flex items-center gap-3">
            <div class="relative">
              <div class="w-9 h-9 bg-gradient-to-br from-primary-400 to-secondary-500 rounded-full flex items-center justify-center text-white text-sm font-bold ring-2 ring-white shadow-md">
                {{ currentUser?.name?.charAt(0)?.toUpperCase() }}
              </div>
              <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-500 rounded-full border-2 border-white"></div>
            </div>
            <div class="hidden md:block">
              <p class="text-sm font-semibold text-slate-800 leading-tight">{{ currentUser?.name }}</p>
              <p class="text-[11px] text-slate-400">Online</p>
            </div>
          </div>

          <!-- Logout -->
          <button (click)="logout()" class="btn-icon hover:text-red-500" title="Logout">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 p-6 animate-fade-in-up">
      <router-outlet></router-outlet>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-200/50 bg-white/50 backdrop-blur-sm py-3 px-6">
      <div class="flex items-center justify-between text-xs text-slate-400">
        <span>&copy; 2024 BugSquash CI &mdash; Built by Sohaib Akhlaq</span>
        <span>v1.0.0</span>
      </div>
    </footer>
  </div>
</div>

<!-- Mobile Overlay -->
<div *ngIf="showMobileMenu" (click)="toggleMobileMenu()"
     class="fixed inset-0 bg-black/30 z-20 lg:hidden backdrop-blur-sm"></div>
