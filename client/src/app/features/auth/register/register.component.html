<div class="min-h-screen bg-gradient-to-br from-primary-950 via-primary-900 to-slate-900 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-20 right-10 w-72 h-72 bg-primary-500/10 rounded-full blur-3xl animate-float"></div>
    <div class="absolute bottom-20 left-10 w-96 h-96 bg-secondary-500/10 rounded-full blur-3xl animate-float" style="animation-delay:-3s"></div>
  </div>
  <div class="sm:mx-auto sm:w-full sm:max-w-lg relative z-10 animate-fade-in-up">
    <div class="flex justify-center mb-6"><div class="w-16 h-16 bg-gradient-to-br from-primary-400 to-secondary-500 rounded-2xl flex items-center justify-center shadow-neon-lg"><svg class="w-9 h-9 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 12.75c1.148 0 2.278.08 3.383.237 1.037.146 1.866.966 1.866 2.013 0 3.728-2.35 6.75-5.25 6.75S6.75 18.728 6.75 15c0-1.046.83-1.867 1.866-2.013A24.204 24.204 0 0112 12.75zm0 0c2.883 0 5.647.508 8.207 1.44a23.91 23.91 0 01-1.152-6.135c-.22-2.057-1.907-3.555-3.966-3.555H8.911c-2.059 0-3.746 1.498-3.966 3.555a23.908 23.908 0 01-1.152 6.135A24.078 24.078 0 0112 12.75z"/></svg></div></div>
    <h2 class="text-center text-3xl font-extrabold text-white">Create Account</h2>
    <p class="mt-2 text-center text-sm text-primary-200/70">Join the BugSquash CI platform</p>
  </div>
  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-lg relative z-10 animate-fade-in-up" style="animation-delay:0.1s">
    <div class="card-glass py-8 px-6 sm:px-10 shadow-glass-lg border-white/10">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="input-label text-slate-300">Full Name</label>
          <div class="relative"><svg class="icon-sm absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
          <input type="text" formControlName="name" placeholder="John Doe" class="input-field pl-11 bg-white/10 border-white/15 text-white placeholder:text-slate-500 focus:bg-white/15"></div>
          <div *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched" class="input-error">Name must be at least 2 characters</div>
        </div>
        <div>
          <label class="input-label text-slate-300">Email</label>
          <div class="relative"><svg class="icon-sm absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
          <input type="email" formControlName="email" placeholder="you@example.com" class="input-field pl-11 bg-white/10 border-white/15 text-white placeholder:text-slate-500 focus:bg-white/15"></div>
          <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="input-error">Please enter a valid email</div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="input-label text-slate-300">Role</label><select formControlName="role" class="select-field bg-white/10 border-white/15 text-white focus:bg-white/15"><option *ngFor="let r of roles" [value]="r.value" class="text-slate-800">{{ r.label }}</option></select></div>
          <div><label class="input-label text-slate-300">Department</label><select formControlName="department" class="select-field bg-white/10 border-white/15 text-white focus:bg-white/15"><option *ngFor="let d of departments" [value]="d" class="text-slate-800">{{ d }}</option></select></div>
        </div>
        <div><label class="input-label text-slate-300">Job Title (optional)</label><input type="text" formControlName="title" placeholder="QA Engineer" class="input-field bg-white/10 border-white/15 text-white placeholder:text-slate-500 focus:bg-white/15"></div>
        <div><label class="input-label text-slate-300">Password</label><input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Min 6 characters" class="input-field bg-white/10 border-white/15 text-white placeholder:text-slate-500 focus:bg-white/15">
          <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="input-error">Password must be at least 6 characters</div></div>
        <div><label class="input-label text-slate-300">Confirm Password</label><input type="password" formControlName="confirmPassword" placeholder="Re-enter password" class="input-field bg-white/10 border-white/15 text-white placeholder:text-slate-500 focus:bg-white/15">
          <div *ngIf="registerForm.get('confirmPassword')?.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched" class="input-error">Passwords do not match</div></div>
        <div *ngIf="errorMessage" class="alert-error bg-red-500/10 border-red-500/30"><svg class="icon-sm text-red-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg><p class="text-sm text-red-300">{{ errorMessage }}</p></div>
        <button type="submit" [disabled]="registerForm.invalid || isLoading" class="w-full btn-primary py-3.5 text-base flex items-center justify-center gap-2">
          <svg *ngIf="!isLoading" class="icon-sm" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 006.16-12.12A14.98 14.98 0 009.631 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 00-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.448 14.9 14.9 0 01.06-.312m-2.24 2.39a4.493 4.493 0 00-1.757 4.306 4.493 4.493 0 004.306-1.758M16.5 9a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/></svg>
          <span *ngIf="!isLoading">Create Account</span>
          <svg *ngIf="isLoading" class="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
          <span *ngIf="isLoading">Creating...</span>
        </button>
      </form>
      <div class="mt-6 text-center"><span class="text-sm text-slate-500">Already have an account? </span><a routerLink="/login" class="text-sm font-semibold text-primary-400 hover:text-primary-300 transition-colors">Sign in</a></div>
    </div>
  </div>
</div>
