<div class="min-h-screen bg-gradient-to-br from-dark-900 via-dark-800 to-primary-900 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  <!-- Background -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <div class="absolute top-20 right-10 w-72 h-72 bg-primary-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 left-10 w-96 h-96 bg-primary-600/10 rounded-full blur-3xl"></div>
  </div>

  <!-- Logo -->
  <div class="sm:mx-auto sm:w-full sm:max-w-lg relative z-10 animate-slide-down">
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 bg-gradient-to-br from-primary-400 to-primary-700 rounded-2xl flex items-center justify-center shadow-neon-lg">
        <span class="text-white text-2xl font-bold">BQ</span>
      </div>
    </div>
    <h2 class="text-center text-3xl font-extrabold text-white">Create Account</h2>
    <p class="mt-2 text-center text-sm text-dark-300">Join BugSquash CI platform</p>
  </div>

  <!-- Register Card -->
  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-lg relative z-10 animate-slide-up">
    <div class="card-glass py-8 px-6 sm:px-10 shadow-glass-lg">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Name -->
        <div>
          <label for="name" class="input-label text-dark-200">Full Name</label>
          <input id="name" type="text" formControlName="name" placeholder="John Doe"
                 class="input-field bg-white/10 border-white/20 text-dark-800 placeholder:text-dark-400 focus:bg-white/20">
          <div *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched" class="input-error">
            Name must be at least 2 characters
          </div>
        </div>

        <!-- Email -->
        <div>
          <label for="reg-email" class="input-label text-dark-200">Email</label>
          <input id="reg-email" type="email" formControlName="email" placeholder="you@example.com"
                 class="input-field bg-white/10 border-white/20 text-dark-800 placeholder:text-dark-400 focus:bg-white/20">
          <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="input-error">
            Please enter a valid email
          </div>
        </div>

        <!-- Role & Department -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="input-label text-dark-200">Role</label>
            <select formControlName="role"
                    class="select-field bg-white/10 border-white/20 text-dark-800 focus:bg-white/20">
              <option *ngFor="let r of roles" [value]="r.value">{{ r.label }}</option>
            </select>
          </div>
          <div>
            <label class="input-label text-dark-200">Department</label>
            <select formControlName="department"
                    class="select-field bg-white/10 border-white/20 text-dark-800 focus:bg-white/20">
              <option *ngFor="let d of departments" [value]="d">{{ d }}</option>
            </select>
          </div>
        </div>

        <!-- Title -->
        <div>
          <label for="title" class="input-label text-dark-200">Job Title (optional)</label>
          <input id="title" type="text" formControlName="title" placeholder="QA Engineer"
                 class="input-field bg-white/10 border-white/20 text-dark-800 placeholder:text-dark-400 focus:bg-white/20">
        </div>

        <!-- Password -->
        <div>
          <label for="reg-password" class="input-label text-dark-200">Password</label>
          <input id="reg-password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                 placeholder="Min 6 characters"
                 class="input-field bg-white/10 border-white/20 text-dark-800 placeholder:text-dark-400 focus:bg-white/20">
          <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="input-error">
            Password must be at least 6 characters
          </div>
        </div>

        <!-- Confirm Password -->
        <div>
          <label for="confirm-password" class="input-label text-dark-200">Confirm Password</label>
          <input id="confirm-password" type="password" formControlName="confirmPassword" placeholder="Re-enter password"
                 class="input-field bg-white/10 border-white/20 text-dark-800 placeholder:text-dark-400 focus:bg-white/20">
          <div *ngIf="registerForm.get('confirmPassword')?.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched" class="input-error">
            Passwords do not match
          </div>
        </div>

        <!-- Error -->
        <div *ngIf="errorMessage" class="alert-error animate-slide-down">
          <p class="text-sm">⚠️ {{ errorMessage }}</p>
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="registerForm.invalid || isLoading"
                class="w-full btn-primary py-3 text-base">
          <span *ngIf="!isLoading">🚀 Create Account</span>
          <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Creating...
          </span>
        </button>
      </form>

      <div class="mt-6 text-center">
        <span class="text-sm text-dark-500">Already have an account? </span>
        <a routerLink="/login" class="text-sm font-semibold text-primary-600 hover:text-primary-700">Sign in</a>
      </div>
    </div>
  </div>
</div>
