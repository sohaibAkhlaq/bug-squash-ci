<div class="min-h-screen bg-gradient-to-br from-dark-900 via-dark-800 to-primary-900 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  <!-- Background Decoration -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <div class="absolute top-20 left-10 w-72 h-72 bg-primary-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 right-10 w-96 h-96 bg-primary-600/10 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary-400/5 rounded-full blur-3xl"></div>
  </div>

  <!-- Logo & Title -->
  <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10 animate-slide-down">
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 bg-gradient-to-br from-primary-400 to-primary-700 rounded-2xl flex items-center justify-center shadow-neon-lg">
        <span class="text-white text-2xl font-bold">BQ</span>
      </div>
    </div>
    <h2 class="text-center text-3xl font-extrabold text-white">
      BugSquash CI
    </h2>
    <p class="mt-2 text-center text-sm text-dark-300">
      QA Test Management Platform
    </p>
  </div>

  <!-- Login Card -->
  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10 animate-slide-up">
    <div class="card-glass py-8 px-6 sm:px-10 shadow-glass-lg">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Email -->
        <div>
          <label for="email" class="input-label text-dark-200">Email address</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-dark-400">📧</span>
            <input id="email" type="email" formControlName="email" autocomplete="email"
                   placeholder="you@example.com"
                   class="input-field pl-10 bg-white/10 border-white/20 text-dark-800 placeholder:text-dark-400
                          focus:bg-white/20 focus:border-primary-400">
          </div>
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="input-error">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email</span>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="input-label text-dark-200">Password</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-dark-400">🔒</span>
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                   autocomplete="current-password" placeholder="••••••••"
                   class="input-field pl-10 pr-10 bg-white/10 border-white/20 text-dark-800 placeholder:text-dark-400
                          focus:bg-white/20 focus:border-primary-400">
            <button type="button" (click)="togglePassword()"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-dark-400 hover:text-dark-600 transition-colors">
              {{ showPassword ? '🙈' : '👁️' }}
            </button>
          </div>
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="input-error">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">At least 6 characters</span>
          </div>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="alert-error animate-slide-down">
          <div class="flex items-center gap-2">
            <span>⚠️</span>
            <p class="text-sm">{{ errorMessage }}</p>
          </div>
        </div>

        <!-- Submit -->
        <div>
          <button type="submit" [disabled]="loginForm.invalid || isLoading"
                  class="w-full btn-primary py-3 text-base">
            <span *ngIf="!isLoading" class="flex items-center justify-center gap-2">
              🚀 Sign in
            </span>
            <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
              <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              Signing in...
            </span>
          </button>
        </div>
      </form>

      <!-- Divider -->
      <div class="mt-8">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-dark-200/30"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white/70 text-dark-500 rounded-full">New to BugSquash CI?</span>
          </div>
        </div>

        <div class="mt-6">
          <a routerLink="/register"
             class="w-full btn-secondary block text-center py-3 bg-white/10 border-white/20 text-dark-700 hover:bg-white/20">
            Create an account
          </a>
        </div>
      </div>

      <!-- Demo Credentials -->
      <div class="mt-6 p-4 bg-primary-50/50 rounded-xl border border-primary-200/50">
        <p class="text-xs font-semibold text-primary-700 mb-2">🔑 Demo Credentials</p>
        <div class="grid grid-cols-2 gap-1 text-xs text-dark-600">
          <span class="font-medium">Admin:</span>
          <span>admin&#64;bugsquash.com / Admin123</span>
          <span class="font-medium">QA:</span>
          <span>sarah&#64;bugsquash.com / Sarah123</span>
        </div>
      </div>
    </div>
  </div>
</div>
